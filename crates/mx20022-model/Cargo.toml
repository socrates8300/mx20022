[package]
name = "mx20022-model"
version = "0.2.0"
description = "Strongly-typed ISO 20022 message models generated from official XSD schemas (pacs, pain, camt, head)"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/mx20022-model"
keywords = ["iso20022", "payments", "finance", "serde", "xml"]
categories = ["encoding", "data-structures"]

[features]
default = ["pacs"]
pacs = []
pain = []
camt = []
head = []
all = ["pacs", "pain", "camt", "head"]

[dependencies]
serde.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true

[lints]
workspace = true
